<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Ticket Virtual</title>
  <link rel="icon" type="image/png" href="../images/LOGO-COSO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: var(--dark);
    }

    .auth-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 36px 24px; }
    }

    .auth-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }
    .auth-logo img { height: 52px; width: auto; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 32px;
    }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .auth-tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }

    .auth-form { display: none; flex-direction: column; gap: 14px; }
    .auth-form.active { display: flex; }

    .auth-field {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      padding: 14px 18px;
      color: var(--white);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
    }
    .auth-field::placeholder { color: rgba(255,255,255,0.35); }
    .auth-field:focus {
      border-color: var(--green);
      background: rgba(255,255,255,0.09);
    }

    .auth-submit {
      width: 100%;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 40px;
      padding: 15px 24px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .auth-submit:hover { opacity: 0.85; }
    .auth-submit:disabled { opacity: 0.5; cursor: default; }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
    }
    .auth-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .auth-divider-text {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .auth-forgot {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      transition: color 0.2s;
      margin-top: -4px;
    }
    .auth-forgot:hover { color: var(--green); }

    .auth-switch {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 8px;
    }
    .auth-switch span {
      color: var(--green);
      cursor: pointer;
      font-weight: 600;
    }
    .auth-switch span:hover { opacity: 0.8; }

    .auth-back {
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      top: 28px;
      left: clamp(24px, 5vw, 80px);
      color: rgba(255,255,255,0.5);
      font-family: var(--font-body);
      font-size: 13px;
      transition: color 0.2s;
      z-index: 10;
      text-decoration: none;
    }
    .auth-back:hover { color: var(--white); }

    .auth-msg {
      font-size: 13px;
      text-align: center;
      padding: 10px 16px;
      border-radius: 8px;
      display: none;
    }
    .auth-msg.success {
      background: rgba(255,140,0,0.12);
      color: var(--green);
      border: 1px solid rgba(255,140,0,0.3);
      display: block;
    }
    .auth-msg.error {
      background: rgba(220,50,50,0.1);
      color: #ff6b6b;
      border: 1px solid rgba(220,50,50,0.25);
      display: block;
    }

    .password-wrapper { position: relative; }
    .password-wrapper .auth-field { padding-right: 46px; }
    .toggle-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
      font-size: 16px;
      background: none;
      border: none;
      padding: 0;
      line-height: 1;
    }
    .toggle-pass:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body class="body">

  <a href="../index.html" class="auth-back">← Volver al inicio</a>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <img src="../images/LOGO png negro.png" alt="Ticket Virtual" />
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Iniciar sesión</div>
        <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Crear cuenta</div>
      </div>

      <!-- LOGIN FORM -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <div id="msg-login" class="auth-msg"></div>

        <input type="email" class="auth-field" id="login-email" placeholder="Correo electrónico" required />

        <div class="password-wrapper">
          <input type="password" class="auth-field" id="login-pass" placeholder="Contraseña" required />
          <button type="button" class="toggle-pass" onclick="togglePass('login-pass', this)">👁</button>
        </div>

        <div class="auth-forgot" onclick="showForgot()">¿Olvidaste tu contraseña?</div>

        <button type="submit" class="auth-submit" id="btn-login">Iniciar sesión</button>

        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <div class="auth-divider-text">o</div>
          <div class="auth-divider-line"></div>
        </div>

        <div class="auth-switch">¿No tenés cuenta? <span onclick="switchTab('register')">Crear cuenta</span></div>
      </form>

      <!-- REGISTER FORM -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <div id="msg-register" class="auth-msg"></div>

        <input type="text" class="auth-field" id="reg-name" placeholder="Nombre completo" required />
        <input type="email" class="auth-field" id="reg-email" placeholder="Correo electrónico" required />

        <div class="password-wrapper">
          <input type="password" class="auth-field" id="reg-pass" placeholder="Contraseña" required minlength="6" />
          <button type="button" class="toggle-pass" onclick="togglePass('reg-pass', this)">👁</button>
        </div>

        <div class="password-wrapper">
          <input type="password" class="auth-field" id="reg-pass2" placeholder="Repetir contraseña" required />
          <button type="button" class="toggle-pass" onclick="togglePass('reg-pass2', this)">👁</button>
        </div>

        <button type="submit" class="auth-submit" id="btn-register">Crear cuenta</button>

        <div class="auth-divider">
          <div class="auth-divider-line"></div>
          <div class="auth-divider-text">o</div>
          <div class="auth-divider-line"></div>
        </div>

        <div class="auth-switch">¿Ya tenés cuenta? <span onclick="switchTab('login')">Iniciar sesión</span></div>
      </form>

    </div>
  </div>

  <script>
    const STORAGE_KEY = 'tv_users';

    /* ── Seed: carga users.json en localStorage la primera vez ── */
    async function seedUsers() {
      if (localStorage.getItem(STORAGE_KEY)) return;
      try {
        const res = await fetch('../data/users.json');
        const users = await res.json();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
      }
    }

    function getUsers() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveUsers(users) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    /* ── UI helpers ── */
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').classList.toggle('active', tab === 'login');
      document.getElementById('form-register').classList.toggle('active', tab === 'register');
      document.getElementById('msg-login').className = 'auth-msg';
      document.getElementById('msg-register').className = 'auth-msg';
    }

    function togglePass(fieldId, btn) {
      const field = document.getElementById(fieldId);
      field.type = field.type === 'password' ? 'text' : 'password';
      btn.textContent = field.type === 'password' ? '👁' : '🙈';
    }

    function showMsg(id, text, type) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = 'auth-msg ' + type;
    }

    /* ── Login ── */
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim().toLowerCase();
      const pass  = document.getElementById('login-pass').value;
      const users = getUsers();
      const user  = users.find(u => u.email.toLowerCase() === email && u.password === pass);

      if (!user) {
        showMsg('msg-login', 'Correo o contraseña incorrectos.', 'error');
        return;
      }

      const btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      /* guardar sesión y redirigir al index */
      localStorage.setItem('tv_session', JSON.stringify({ name: user.name, email: user.email }));
      setTimeout(() => { window.location.href = '../index.html'; }, 800);
    }

    /* ── Registro ── */
    function handleRegister(e) {
      e.preventDefault();
      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim().toLowerCase();
      const pass  = document.getElementById('reg-pass').value;
      const pass2 = document.getElementById('reg-pass2').value;

      if (pass !== pass2) {
        showMsg('msg-register', 'Las contraseñas no coinciden.', 'error');
        return;
      }

      const users = getUsers();
      if (users.find(u => u.email.toLowerCase() === email)) {
        showMsg('msg-register', 'Ya existe una cuenta con ese correo.', 'error');
        return;
      }

      users.push({ name, email, password: pass });
      saveUsers(users);

      const btn = document.getElementById('btn-register');
      btn.disabled = true;
      btn.textContent = 'Creando cuenta...';
      setTimeout(() => {
        showMsg('msg-register', '✓ Cuenta creada. Ya podés iniciar sesión.', 'success');
        btn.disabled = false;
        btn.textContent = 'Crear cuenta';
        document.getElementById('form-register').reset();
        setTimeout(() => switchTab('login'), 2000);
      }, 800);
    }

    function showForgot() {
      showMsg('msg-login', 'Funcionalidad de recuperación próximamente.', 'success');
    }

    seedUsers();
  </script>
</body>
</html>
