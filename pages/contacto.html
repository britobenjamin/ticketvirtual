  <script>
    function handleContactForm(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.contact-submit');
      btn.textContent = '¡Enviado!';
      btn.disabled = true;
      setTimeout(() => { btn.textContent = 'Enviar'; btn.disabled = false; e.target.reset(); }, 3000);
    }
    function filtrarEventos(query) {
      const q = query.toLowerCase().trim();
      document.querySelectorAll('.eventos-grid .evento-card-v2').forEach(function(card) {
        const nombre = card.querySelector('.ec-name');
        const venue  = card.querySelector('.ec-venue-label');
        const texto  = ((nombre ? nombre.textContent : '') + ' ' + (venue ? venue.textContent : '')).toLowerCase();
        card.style.display = (!q || texto.includes(q)) ? '' : 'none';
      });
    }
  </script>
