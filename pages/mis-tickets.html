<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Tickets | Ticket Virtual</title>
  <link rel="icon" type="image/png" href="../images/LOGO-COSO.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .tickets-page {
      min-height: 100vh;
      background: var(--dark);
      padding: 100px 24px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tickets-back {
      display: flex;
      align-items: center;
      gap: 8px;
      position: fixed;
      top: 28px;
      left: clamp(24px, 5vw, 80px);
      color: rgba(255,255,255,0.5);
      font-family: var(--font-body);
      font-size: 13px;
      transition: color 0.2s;
      z-index: 10;
      text-decoration: none;
    }
    .tickets-back:hover { color: var(--white); }

    .tickets-header {
      width: 100%;
      max-width: 760px;
      margin-bottom: 36px;
    }
    .tickets-title {
      font-family: var(--font-display);
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      color: var(--white);
      margin-bottom: 6px;
    }
    .tickets-subtitle {
      font-family: var(--font-body);
      font-size: 14px;
      color: rgba(255,255,255,0.4);
    }

    /* ── Lista de tickets ── */
    .tickets-list {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ticket-row {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 18px 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    .ticket-row:hover {
      border-color: rgba(255,140,0,0.3);
      background: rgba(255,255,255,0.06);
    }

    /* Flyer cuadrado */
    .ticket-flyer {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.08);
    }
    .ticket-flyer-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 10px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #1a3060 0%, #3d2000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    /* Info central */
    .ticket-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .ticket-event-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ticket-meta {
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ticket-badges {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }
    .ticket-badge {
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 40px;
    }
    .badge-tier {
      background: rgba(255,140,0,0.15);
      color: var(--green);
      border: 1px solid rgba(255,140,0,0.3);
    }
    .badge-active {
      background: rgba(80,200,120,0.12);
      color: #5edb8f;
      border: 1px solid rgba(80,200,120,0.3);
    }
    .badge-used {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.3);
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Botón QR */
    .ticket-qr-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 40px;
      padding: 10px 18px;
      color: rgba(255,255,255,0.7);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .ticket-qr-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: rgba(255,140,0,0.06);
    }
    .ticket-qr-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* Estado vacío */
    .tickets-empty {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 80px 0;
      display: none;
    }
    .tickets-empty-icon { font-size: 56px; opacity: 0.3; }
    .tickets-empty-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.3);
    }
    .tickets-empty-sub {
      font-family: var(--font-body);
      font-size: 14px;
      color: rgba(255,255,255,0.2);
    }
    .tickets-empty-cta {
      display: inline-block;
      margin-top: 8px;
      background: var(--green);
      color: var(--dark);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .tickets-empty-cta:hover { opacity: 0.85; }

    /* ── Modal QR ── */
    .qr-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .qr-modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .qr-modal {
      background: #112236;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 36px;
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transform: translateY(16px) scale(0.97);
      transition: transform 0.25s;
    }
    .qr-modal-overlay.open .qr-modal {
      transform: translateY(0) scale(1);
    }

    .qr-modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .qr-modal-close:hover { color: var(--white); }

    .qr-modal-event {
      text-align: center;
    }
    .qr-modal-event-name {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 4px;
    }
    .qr-modal-event-meta {
      font-family: var(--font-body);
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }

    .qr-code-wrapper {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-code-wrapper img {
      width: 220px;
      height: 220px;
      display: block;
      border-radius: 4px;
    }

    .qr-ticket-id {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }

    .qr-modal-footer {
      font-family: var(--font-body);
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      line-height: 1.5;
    }

    .qr-download-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--green);
      color: var(--dark);
      border: none;
      border-radius: 40px;
      padding: 14px 24px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .qr-download-btn:hover { opacity: 0.85; }
    .qr-download-btn:disabled { opacity: 0.5; cursor: default; }

    @media (max-width: 600px) {
      .ticket-row { flex-wrap: wrap; gap: 14px; }
      .ticket-qr-btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body class="body">

  <a href="../index.html" class="tickets-back">← Volver al inicio</a>

  <div class="tickets-page">

    <div class="tickets-header">
      <h1 class="tickets-title">Mis Tickets</h1>
      <p class="tickets-subtitle">Tus entradas compradas y su código QR de acceso</p>
    </div>

    <div class="tickets-list" id="tickets-list">
      <!-- Se rellena con JS -->
    </div>

    <div class="tickets-empty" id="tickets-empty">
      <div class="tickets-empty-icon">🎟️</div>
      <div class="tickets-empty-text">Todavía no tenés tickets</div>
      <div class="tickets-empty-sub">Explorá los próximos eventos y conseguí tu entrada.</div>
      <a href="eventos.html" class="tickets-empty-cta">Ver eventos</a>
    </div>

  </div>

  <!-- Modal QR -->
  <div class="qr-modal-overlay" id="qr-overlay" onclick="closeQR(event)">
    <div class="qr-modal">
      <button class="qr-modal-close" onclick="closeQRBtn()">✕</button>

      <div class="qr-modal-event">
        <div class="qr-modal-event-name" id="qr-event-name"></div>
        <div class="qr-modal-event-meta" id="qr-event-meta"></div>
      </div>

      <div class="qr-code-wrapper">
        <img id="qr-img" src="" alt="Código QR" />
      </div>

      <div class="qr-ticket-id" id="qr-ticket-id"></div>

      <div class="qr-modal-footer">
        Presentá este código en el ingreso al evento.<br>
        No compartas tu QR con nadie.
      </div>

      <button class="qr-download-btn" id="qr-download-btn" onclick="downloadPDF()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Descargar en PDF
      </button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    const SESSION_KEY = 'tv_session';
    const session = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null');
    if (!session) { window.location.href = 'login.html'; }

    /* ── Tickets de muestra (reemplazar con datos reales cuando exista compra) ── */
    const SAMPLE_TICKETS = [
      {
        id: 'TV-20240318-001',
        eventName: 'Ultra Music Festival',
        date: 'Sáb 18 Mar 2025',
        venue: 'Estadio Único, La Plata',
        tier: 'General',
        status: 'active',
        emoji: '🎵'
      },
      {
        id: 'TV-20240412-002',
        eventName: 'Lollapalooza Argentina',
        date: 'Dom 13 Abr 2025',
        venue: 'Hipódromo de San Isidro',
        tier: 'VIP',
        status: 'active',
        emoji: '🎸'
      },
      {
        id: 'TV-20231201-003',
        eventName: 'New Year\'s Bash 2024',
        date: 'Dom 31 Dic 2023',
        venue: 'Costanera Sur, CABA',
        tier: 'Early Bird',
        status: 'used',
        emoji: '🎆'
      }
    ];

    function renderTickets() {
      const list  = document.getElementById('tickets-list');
      const empty = document.getElementById('tickets-empty');

      /* Leer tickets del usuario desde localStorage (o usar sample) */
      const userTickets = getUserTickets();

      if (userTickets.length === 0) {
        list.style.display  = 'none';
        empty.style.display = 'flex';
        return;
      }

      list.innerHTML = userTickets.map(t => `
        <div class="ticket-row">
          <div class="ticket-flyer-placeholder">${t.emoji}</div>
          <div class="ticket-info">
            <div class="ticket-event-name">${t.eventName}</div>
            <div class="ticket-meta">${t.date} · ${t.venue}</div>
            <div class="ticket-badges">
              <span class="ticket-badge badge-tier">${t.tier}</span>
              <span class="ticket-badge ${t.status === 'active' ? 'badge-active' : 'badge-used'}">
                ${t.status === 'active' ? 'Válido' : 'Usado'}
              </span>
            </div>
          </div>
          <button class="ticket-qr-btn" onclick="openQR('${t.id}', '${escapeAttr(t.eventName)}', '${escapeAttr(t.date + ' · ' + t.venue)}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="14" y2="14"/>
              <line x1="17" y1="14" x2="17" y2="14"/><line x1="20" y1="14" x2="20" y2="14"/>
              <line x1="14" y1="17" x2="14" y2="17"/><line x1="17" y1="17" x2="17" y2="17"/>
              <line x1="20" y1="17" x2="20" y2="17"/><line x1="14" y1="20" x2="14" y2="20"/>
              <line x1="17" y1="20" x2="17" y2="20"/><line x1="20" y1="20" x2="20" y2="20"/>
            </svg>
            Ver código QR
          </button>
        </div>
      `).join('');
    }

    function getUserTickets() {
      /* En el futuro: filtrar por email del usuario desde una DB.
         Por ahora mostramos los tickets de muestra para todos los usuarios. */
      return SAMPLE_TICKETS;
    }

    function escapeAttr(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    /* ── Modal QR ── */
    function openQR(ticketId, eventName, eventMeta) {
      document.getElementById('qr-event-name').textContent = eventName;
      document.getElementById('qr-event-meta').textContent = eventMeta;
      document.getElementById('qr-ticket-id').textContent  = 'ID: ' + ticketId;

      /* Genera QR con el ID del ticket */
      const qrData = encodeURIComponent('TICKETVIRTUAL:' + ticketId);
      document.getElementById('qr-img').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=0&data=' + qrData;

      document.getElementById('qr-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeQR(e) {
      if (e.target === document.getElementById('qr-overlay')) closeQRBtn();
    }

    function closeQRBtn() {
      document.getElementById('qr-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    async function fetchAsBase64(url) {
      const res  = await fetch(url);
      const blob = await res.blob();
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function downloadPDF() {
      const btn       = document.getElementById('qr-download-btn');
      const eventName = document.getElementById('qr-event-name').textContent;
      const eventMeta = document.getElementById('qr-event-meta').textContent;
      const ticketId  = document.getElementById('qr-ticket-id').textContent;
      const qrSrc     = document.getElementById('qr-img').src;
      const logoSrc   = new URL('../images/LOGO png negro.png', window.location.href).href;

      btn.disabled    = true;
      btn.textContent = 'Generando…';

      try {
        const [qrData, logoData] = await Promise.all([
          fetchAsBase64(qrSrc),
          fetchAsBase64(logoSrc)
        ]);

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        /* Fondo oscuro */
        doc.setFillColor(13, 25, 41);
        doc.rect(0, 0, 210, 297, 'F');

        /* ── Logo: fondo transparente, directo sobre el oscuro ── */
        /* El logo es 890×478 px → ratio 1.86:1 */
        const logoW = 100;
        const logoH = Math.round(logoW / 1.86);   /* ≈ 54mm */
        const logoX = (210 - logoW) / 2;
        const logoY = 10;

        doc.addImage(logoData, 'PNG', logoX, logoY, logoW, logoH, '', 'FAST');

        /* Línea separadora naranja */
        const sepY = logoY + logoH + 6;
        doc.setDrawColor(255, 140, 0);
        doc.setLineWidth(0.4);
        doc.line(30, sepY, 180, sepY);

        /* Nombre del evento */
        const nameY = sepY + 14;
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(20);
        doc.setFont('helvetica', 'bold');
        doc.text(eventName, 105, nameY, { align: 'center', maxWidth: 160 });

        /* Fecha y venue */
        const metaY = nameY + 10;
        doc.setTextColor(160, 160, 160);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.text(eventMeta, 105, metaY, { align: 'center', maxWidth: 160 });

        /* Código QR centrado */
        const qrY = metaY + 10;
        doc.addImage(qrData, 'PNG', 55, qrY, 100, 100);

        /* Marco blanco alrededor del QR */
        doc.setDrawColor(255, 255, 255);
        doc.setLineWidth(0.3);
        doc.roundedRect(54, qrY - 1, 102, 102, 4, 4, 'S');

        /* ID del ticket */
        const idY = qrY + 108;
        doc.setTextColor(100, 100, 100);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'bold');
        doc.text(ticketId.toUpperCase(), 105, idY, { align: 'center' });

        /* Línea */
        doc.setDrawColor(40, 60, 80);
        doc.setLineWidth(0.3);
        doc.line(30, idY + 6, 180, idY + 6);

        /* Footer */
        doc.setTextColor(80, 100, 120);
        doc.setFontSize(8);
        doc.setFont('helvetica', 'normal');
        doc.text('Presentá este código en el ingreso al evento.', 105, idY + 14, { align: 'center' });
        doc.text('No compartas tu QR con nadie.', 105, idY + 20, { align: 'center' });

        const fileName = `ticket-${ticketId.replace(/[^a-zA-Z0-9-]/g, '')}.pdf`;
        doc.save(fileName);
      } catch (err) {
        console.error(err);
        alert('No se pudo generar el PDF. Verificá tu conexión e intentá de nuevo.');
      } finally {
        btn.disabled  = false;
        btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar en PDF`;
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeQRBtn();
    });

    renderTickets();
  </script>
</body>
</html>
